company_preference:
  big_company_required: false
  preferred_company_types:
    - 自媒体 / MCN（独立工作室、头部 MCN、内容创作公司）
    - 教育（新东方、学而思、好未来、猿辅导、作业帮等；不含教育出版社/学报）
    - 新一代电商 / 内容电商（东方甄选、三只松鼠、完美日记、花西子等）
    - 其他需要频繁做视频、依赖视频获客或通过视频获得收入的公司
  preferred_industries:
    - 自媒体
    - MCN
    - 教育
    - 内容电商
    - 直播电商
    - 在线教育
    - 视频获客
  notes: |
    公司关先过滤明确不用看的公司/公司类型；拿不准的一律放过。
    所有互联网大厂/中厂，除字节、快手、小红书外都过滤，包括阿里、腾讯、美团、京东、拼多多、B 站、百度、搜狐、携程、微博等；Keep 等小规模垂直互联网公司不因公司规模过滤。
    政府、事业单位都不要，包括官方媒体、出版社、学报、大学出版社等。
    偏好自媒体 / MCN、教育、电商，以及其他需要频繁做视频、依赖视频获客或通过视频获得收入的公司。
job_content_preference:
  role_summary: 短视频内容操盘（自己出脚本、自己拍、自己剪），平台不限；只做图文不行
  # 职位关代码预筛(LLM 前):命中黑名单→直接刷;命中白名单→豁免硬刷;其余(含豁免)一律再过 LLM 职位关。只按岗位名(期望职位+工作经历职位)子串匹配,黑名单优先(命中黑名单即刷,即便同时命中白名单)。
  title_allow_keywords: ['内容运营', '新媒体运营', '自媒体运营', '短视频运营', '视频运营', '内容策划', '内容创作', '内容编辑', '编导', '短视频编导', '抖音运营', '视频号运营', 'B站运营', '快手运营', '小红书运营', '账号运营', 'IP运营', '矩阵运营', '起号', '博主', 'UP主', '剪辑师', '出镜', '拍摄', '视频剪辑']
  title_block_keywords: ['软件', '开发', '程序员', '前端', '后端', '算法', '测试', '运维', '数据库', '财务', '会计', '出纳', '审计', '税务', '人力资源', 'HR', '人事', '行政', '前台', '文秘', '招聘', '法务', '律师', '合规', '供应链', '采购', '物流', '仓储', '客服', '售后', '质检', '教师', '讲师', '教务', '课程顾问', '医护', '护士', '医生', '数据标注', 'AI训练师', '信息流', '投放', '优化师', '千川', '竞价', 'SEM', '安全', '项目管理', '招商', '商务', 'BD', '达人运营', '红人运营', 'KOL运营', '经纪人', '星探', '艺人经纪', '主播经纪', '产品经理', '产品运营', '社群运营', '私域运营', '策略运营', '数据运营', '业务运营', '搜索运营', '政府关系', '政务', 'PR', '公关', '直播中控', '场控', '销售', '电话销售', '地推', '公众号运营', '图文编辑', '图文文案', '活动策划', '广告代理', '广告投流', '广告策划', '主讲', '跨境', '设计', '图书', '插画师', '录音师', '推广', '售货', '审核', '管培', '课程', '经纪', '动画', '后期', '电商运营', '直播助理', '品牌策划', '品牌营销']
  evaluation_rules:
    - 只看候选人的真实工作经历内容，不看他在 BOSS 上填的"期望职位"。 期望职位填"产品运营"但工作经历是 B 站 UP 主 → 看 UP 主经历判断。
    - 必须涉及短视频。只做图文（公众号/小红书图文为主）的，不要。
    - 平台不再强制抖音；小红书、视频号、B站、抖音等，只要工作主体是短视频都可以。
    - 小红书短视频可以；小红书图文/种草笔记为主的不行。
    - 同时做过图文 + 短视频可以。
    - 必须是亲手做（写脚本、上镜或拍摄、剪辑），不是管乙方/管达人/做素材投放。
    - 必须有过"在公司任职做短视频"的经历，不能只是一直自己做个人账号/个人 IP 博主。 抖音/小红书账号操盘者 + 抖店电商（自己拍+卖货）算，但要求之前在公司里干过，不是 freelance/全是自有账号。
    - 不基于薪资期望硬刷（不管期望 9K 还是 50K），看工作经历内容能力。
    - 业绩判定：先抽离（主体类型/时间/数据口径）再归一化，按主体套达标线；绝对数字结合赛道/机构资源相对判断（资源越好要求越高），不看绝对数，看"代表作水平 + 单位时间产出"。
    - 主体门槛（由低到高，倍数为锚点可微调）：自己搞=基线；乙方≈基线×5；甲方≈基线×7；MCN≈基线×10。机构/资源越强，达标线越高。
    - 自己搞（个人号，自己从0做）：一年内约1万粉，或出过几千赞藏的爆款（且可复制、非孤例），算达标。
    - 乙方（代运营/服务客户，给别人做号）：约5万粉/年，或单条数万赞藏，算达标。
    - 甲方（品牌方自有号，借公司资源做自家号）：约7-10万粉/年，或多条过万赞藏，算达标。
    - MCN（机构号，有团队和流量扶持）：约10万+/年，或多条数万赞藏 / 千万播放级爆款，算达标。
    - 接手已有基础的号：涨粉不作数（基数撑的，不是他的本事），改看其任内是否【持续】做出过万赞藏的爆款；有则达标，没有就不算。
    - 硬不行（直接判不要）：甲方一年多涨粉才一万多；任意主体1-2年累计才几十万播放；全靠单条/单月数据撑场、无持续累计量级。
    - 时间：做短视频满一年仍未做出任何达标成绩，判不要。
    - 互动以"赞藏"为主；播放量不设硬线（可买、靠平台推荐冲，最不可比），只作辅助参考。
    - 含金量：平台/机构资源越好（头部MCN、大平台），同样的数字越不算数，达标线相应抬高，不放水；能进这种竞争激烈的好地方本身是加分项。
    - 境外内容否决：最近两年主体一直在做境外平台内容运营（TikTok海外版/YouTube/X.com 等），即使业绩达标也判不要——大概率不懂中国国内运营机制。
    - 【最高原则·拿不准就过】判定二选一，没有"待定"。只有"明确不对口""全文完全没有业绩数据""有数据但明确低于达标线""满一年没出成绩"才判不要；凡是对口、有成绩迹象但是否达标拿不准、或信息不全的，一律判收藏（过），交人工复核。宁可多放过，不可误刷。
  must_be:
    - 工作经历里有过亲手做短视频内容（脚本/拍摄/剪辑/发布全链路或其中多数）
    - 工作主体是短视频内容，平台不限；有真实视频选题、脚本、拍摄、剪辑、发布、复盘事实
  must_not_be:
    - 只做图文（公众号、小红书图文为主）
    - 小红书图文/种草笔记为主，缺少短视频事实
    - 自己不拍，靠对接/管理达人拍（达人运营、达人 BD、MCN 商务）
    - 只做剪辑（纯后期、视频包装专员、广告素材生产）
    - 产品运营 / 活动运营（即便公司是好公司，岗位偏管理/统筹也不要）
    - 公众号运营 / 图文运营为主
    - 仅做信息流投放（千川/巨量/Meta/Google 等素材投手）
    - 团队管理为主而非亲手做内容
    - 最近两年主体是境外平台内容运营（TikTok海外版/YouTube/X.com 等），大概率不懂中国国内运营机制
  strong_plus:
    - AIGC / AI 工具应用（即梦、可灵、Runway、Midjourney、ChatGPT、Sora、Veo）
    - 抖音、视频号、B 站
    - 0 到 1 起号 / 账号矩阵
    - 完播率、爆款率、涨粉、互动等核心指标方法论
    - 上镜、拍摄、剪辑（剪映、Pr、AE、达芬奇）全链路
    - 有具体可量化战绩（明确的粉丝量级、单条赞藏量级、带货GMV）
    - 批量/持续产出爆款（不是偶发单条）
    - 操盘多个账号 / 账号矩阵
  minus:
    - 纯文案 / 公关稿
    - 客服 / 行政
    - 仅做投放（信息流广告）
    - B 端 SaaS 内容营销 / 行业白皮书 / 央企国企内容专栏
  notes: |
    我要的人是来"亲手做短视频"的，全链路：脚本、拍摄、剪辑、发布、复盘。
    岗位主战场：短视频内容本身，平台不限；抖音不再硬性要求。
    AIGC 是强加分（但不是必须）。
    判断"图文 vs 短视频"时看简历主体是哪种内容产出占比高。
